apiVersion: skiperator.kartverket.no/v1alpha1
kind: SKIPJob
metadata:
  name: condition-finish
status:
  accessPolicies: Ready
  conditions:
    - type: Ready
      status: "True"
      reason: JobFinished
    - type: Failed
      status: "False"
    - type: Running
      status: "False"
    - type: Finished
      status: "True"
    - type: InternalRulesValid
      status: "True"
    - type: ExternalRulesValid
      status: "True"
---
apiVersion: skiperator.kartverket.no/v1alpha1
kind: SKIPJob
metadata:
  name: condition-running
status:
  accessPolicies: Ready
  conditions:
    - type: Ready
      status: "Unknown"
      reason: JobRunning
    - type: Failed
      status: "False"
    - type: Running
      status: "True"
    - type: Finished
      status: "False"
    - type: InternalRulesValid
      status: "True"
    - type: ExternalRulesValid
      status: "True"
---
apiVersion: skiperator.kartverket.no/v1alpha1
kind: SKIPJob
metadata:
  name: condition-fail
status:
  accessPolicies: InvalidConfig
  conditions:
    - type: Ready
      status: "False"
      reason: InvalidConfig
    - type: Failed
      status: "True"
    - type: Running
      status: "False"
    - type: Finished
      status: "False"
    - type: InternalRulesValid
      status: "False"
