# spec.stateful.enabled=true with no volumeClaimTemplates
apiVersion: skiperator.kartverket.no/v1alpha1
kind: Application
metadata:
  name: invalid-stateful-no-vct
spec:
  image: image
  port: 8080
  replicas: 1
  stateful:
    enabled: true
---
# spec.stateful.enabled=true with Recreate strategy
apiVersion: skiperator.kartverket.no/v1alpha1
kind: Application
metadata:
  name: invalid-stateful-recreate
spec:
  image: image
  port: 8080
  replicas: 1
  strategy:
    type: Recreate
  stateful:
    enabled: true
    volumeClaimTemplates:
      - name: data
        mountPath: /data
        spec:
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 1Gi
---
# spec.stateful.enabled=true with HPA-range replicas
apiVersion: skiperator.kartverket.no/v1alpha1
kind: Application
metadata:
  name: invalid-stateful-hpa
spec:
  image: image
  port: 8080
  replicas:
    min: 2
    max: 5
  stateful:
    enabled: true
    volumeClaimTemplates:
      - name: data
        mountPath: /data
        spec:
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 1Gi
