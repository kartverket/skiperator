apiVersion: skiperator.kartverket.no/v1alpha1
kind: Application
metadata:
  name: extra-containers-reserved-port
spec:
  image: image
  port: 8080
  extraContainers:
    - name: sidecar
      image: sidecar:1.0
      additionalPorts:
        - name: main
          port: 9000
          protocol: TCP
