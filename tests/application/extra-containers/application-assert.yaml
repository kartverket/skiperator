apiVersion: apps/v1
kind: Deployment
metadata:
  name: extra-containers
spec:
  template:
    spec:
      containers:
        - name: extra-containers
          image: image
        - name: logging-agent
          image: logging-agent:1.0
          imagePullPolicy: Always
          env:
            - name: LOG_LEVEL
              value: info
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 150
            runAsUser: 150
            runAsNonRoot: true
            seccompProfile:
              type: "RuntimeDefault"
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          volumeMounts:
            - mountPath: /tmp
              name: tmp
      initContainers:
        - name: config-loader
          image: config-loader:1.0
          imagePullPolicy: Always
          restartPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 150
            runAsUser: 150
            runAsNonRoot: true
