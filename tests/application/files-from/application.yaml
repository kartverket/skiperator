apiVersion: skiperator.kartverket.no/v1alpha1
kind: Application
metadata:
  name: files-from
spec:
  image: image
  port: 8080
  filesFrom:
    - mountPath: /config-map
      configMap: config-map

    - mountPath: /secret
      secret: secret

    - mountPath: /empty-dir
      emptyDir: empty-dir

    - mountPath: /persistent-volume-claim
      persistentVolumeClaim: persistent-volume-claim

    - mountPath: /config-map2
      configMap: config-map2
      defaultMode: 0600

    - mountPath: /secret2
      secret: secret2
      defaultMode: 0600
---
apiVersion: skiperator.kartverket.no/v1alpha1
kind: Application
metadata:
  name: files-from-subpath
spec:
  image: image
  port: 8080
  filesFrom:
    - mountPath: /temp/nothing-to-se-here
      emptyDir: normal

    - mountPath: /config-map/sub-path.sub
      configMap: config-map
      defaultMode: 511
      subPath: sub-path.sub

    - mountPath: /secret/sub-path
      secret: secret
      subPath: sub-path

    - mountPath: /empty-dir/sub-path
      emptyDir: empty-dir
      subPath: sub-path

    - mountPath: /persistent-volume-claim/sub-path
      persistentVolumeClaim: persistent-volume-claim
      subPath: sub-path
---
# Test that multiple filesFrom entries with the same volume source are correctly merged into a single volume with multiple mounts.
apiVersion: skiperator.kartverket.no/v1alpha1
kind: Application
metadata:
  name: files-from-same-volumes
spec:
  image: image
  port: 8080
  filesFrom:
    - mountPath: /config-map
      configMap: config-map

    - mountPath: /config-map/han-konfigur
      configMap: config-map

    
    - mountPath: /secret
      secret: secret

    - mountPath: /secret/secret-within-a-secret
      secret: secret
      subPath: secret-within-a-secret

    - mountPath: /tmp/another-empty-dir
      emptyDir: tmp
    
    - persistentVolumeClaim: persistent-volume-claim
      mountPath: /persistent-volume-claim

    - mountPath: /persistent-volume-claim/hippety-hoppety
      persistentVolumeClaim: persistent-volume-claim
