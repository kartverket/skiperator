# Cast error when defaultMode has been given a default value by kubeAPI, due to a prior bug where this caused eternal diff: https://github.com/kartverket/skiperator/pull/643
apiVersion: skiperator.kartverket.no/v1alpha1
kind: Application
metadata:
  name: files-from
spec:
  image: image
  port: 8080
  filesFrom:
    - defaultMode: 420
      mountPath: /config-map
      configMap: config-map
    - defaultMode: 420
      mountPath: /secret
      secret: secret
    - mountPath: /empty-dir
      emptyDir: empty-dir
    - mountPath: /persistent-volume-claim
      persistentVolumeClaim: persistent-volume-claim
    - mountPath: /config-map2
      configMap: config-map2
      defaultMode: 0600
    - mountPath: /secret2
      secret: secret2
      defaultMode: 0600
