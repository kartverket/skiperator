apiVersion: skiperator.kartverket.no/v1alpha1
kind: Application
metadata:
  name: change-rejected
spec:
  image: image
  port: 8080
  stateful: true
  replicas: 1
  volumeClaimTemplates:
    - name: data
      mountPath: /data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
