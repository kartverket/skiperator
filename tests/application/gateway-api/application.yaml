apiVersion: skiperator.kartverket.no/v1alpha1
kind: Application
metadata:
  name: standard
spec:
  image: image
  port: 8080
  routingProvider: standard
  ingresses:
    - standard.example.com
  redirectToHTTPS: true
  istioSettings:
    retries:
      attempts: 4
      perTryTimeout: 2s
      retryOnHttpResponseCodes:
        - 503
        - "504"
