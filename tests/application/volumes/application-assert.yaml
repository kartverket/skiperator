
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-deployment-volumes
spec:
  template:
    spec:
      containers:
        - name: test-deployment-volumes
          image: image
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: config-map
              mountPath: /config-map
            - name: secret
              mountPath: /secret
            - name: empty-dir
              mountPath: /empty-dir
            - name: persistent-volume-claim
              mountPath: /persistent
      volumes:
        - name: tmp
          emptyDir: {}
        - name: config-map
          configMap:
            name: config-map
        - name: secret
          secret:
            secretName: secret
        - name: empty-dir
          emptyDir: {}
        - name: persistent-volume-claim
          persistentVolumeClaim:
            claimName: persistent-volume-claim
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-deployment-volumes-subpath
spec:
  template:
    spec:
      containers:
        - name: test-deployment-volumes-subpath
          image: image
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: config-map
              mountPath: /config-map/sub-path.sub
              subPath: sub-path.sub
            - name: secret
              mountPath: /secret/sub-path
              subPath: sub-path
            - name: empty-dir
              mountPath: /empty-dir/sub-path
              subPath: sub-path
            - name: persistent-volume-claim
              mountPath: /persistent-volume-claim/sub-path
              subPath: sub-path
      volumes:
        - name: tmp
          emptyDir: {}
        - name: config-map
          configMap:
            name: config-map
        - name: secret
          secret:
            secretName: secret
        - name: empty-dir
          emptyDir: {}
        - name: persistent-volume-claim
          persistentVolumeClaim:
            claimName: persistent-volume-claim
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-deployment-volumes-mixed
spec:
  template:
    spec:
      containers:
        - name: test-deployment-volumes-mixed
          image: image
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: config-map
              mountPath: /config-map/sub-path.sub
              subPath: sub-path.sub
            - name: secret
              mountPath: /secret
            - name: secret
              mountPath: /secret/sub-path
              subPath: sub-path
            - name: secret
              mountPath: /secret/password
              subPath: password
      volumes:
        - name: tmp
          emptyDir: {}
        - name: config-map
          configMap:
            name: config-map
        - name: secret
          secret:
            secretName: secret