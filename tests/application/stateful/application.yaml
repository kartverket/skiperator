apiVersion: skiperator.kartverket.no/v1alpha1
kind: Application
metadata:
  name: stateful
spec:
  image: image
  port: 8080
  replicas: 2
  stateful:
    enabled: true
    podManagementPolicy: Parallel
    partition: 0
    pvcRetentionWhenDeleted: Delete
    pvcRetentionWhenScaled: Retain
    volumeClaimTemplates:
      - name: data
        mountPath: /data
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
