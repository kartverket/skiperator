apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: stateful
  labels:
    app.kubernetes.io/name: stateful
    app.kubernetes.io/managed-by: "skiperator"
    skiperator.kartverket.no/controller: "application"
    application.skiperator.no/app: stateful
    application.skiperator.no/app-name: stateful
    application.skiperator.no/app-namespace: ($namespace)
  ownerReferences:
    - apiVersion: skiperator.kartverket.no/v1alpha1
      blockOwnerDeletion: true
      controller: true
      kind: Application
      name: stateful
spec:
  replicas: 2
  serviceName: stateful-headless
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: stateful
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Delete
    whenScaled: Retain
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
  template:
    metadata:
      labels:
        app: stateful
    spec:
      containers:
        - name: stateful
          image: image
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /data
---
apiVersion: v1
kind: Service
metadata:
  name: stateful
spec:
  selector:
    app: stateful
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: stateful-headless
spec:
  selector:
    app: stateful
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: stateful
spec:
  selector:
    matchLabels:
      app: stateful
  maxUnavailable: 1
