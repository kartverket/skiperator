name: write api-docs to skip.kartverket.no

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'config/crd/**'

jobs:
  run-crdoc:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: skiperator

      - name: Run crdoc Docker container
        run: |
         mkdir -p crdoc-resources
         cp skiperator/config/crd/skiperator.kartverket.no_*.yaml crdoc-resources/
         sudo docker run -u $(id -u):$(id -g) --rm -v $PWD:/workdir ghcr.io/fybrik/crdoc:latest --resources /workdir/crdoc-resources --output /workdir/api-docs.md --template /workdir/skiperator/.github/crdoc.tmpl
         rm -rf crdoc-resources

      - name: Checkout target repository
        uses: actions/checkout@v6
        with:
          path: docs
          repository: kartverket/skip.kartverket.no
          ssh-key: ${{ secrets.SKIPDOCS_DEPLOY_KEY }}

      - name: Copy generated output to target repo
        run: |
          cp api-docs.md docs/docs/03-applikasjon-utrulling/03-skiperator/04-api-docs.md

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: pnpm

      - name: Validate target documentation build
        run: |
          cd docs
          pnpm install --frozen-lockfile
          pnpm build

      - name: Commit and push changes
        run: |
          cd docs
          git config --global user.email "skiperator@kartverket.no"
          git config --global user.name "GithubActions"
          git add .
          # Only commit if there are changes
          if git diff --cached --exit-code &>/dev/null; then
            echo "No changes to commit"
          else
            git commit -m "Update Skiperator api-docs"
            git push origin main
          fi
