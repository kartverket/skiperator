name: update api-docs

on:
  workflow_dispatch:
  push:
    branches:
      - fix-update-api-docs
    paths:
      - 'config/crd/**'

permissions:
  contents: write
  packages: write

jobs:
  run-crdoc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: skiperator

      - name: Run crdoc Docker container
        run: |
          mkdir -p crdoc-resources
          cp skiperator/config/crd/skiperator.kartverket.no_*.yaml crdoc-resources/
          sudo docker run -u $(id -u):$(id -g) --rm -v $PWD:/workdir ghcr.io/fybrik/crdoc@sha256:355ef777a45021ee864e613b2234b4f2c6193762e3e0de94a26b66d06cec81c3 --resources /workdir/crdoc-resources --output /workdir/api-docs.md --template /workdir/skiperator/.github/crdoc.tmpl
          rm -rf crdoc-resources

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update API docs"
          title: "Update generated API docs"
          body: |
              This PR updates the generated API documentation.
          branch: update/api-docs
